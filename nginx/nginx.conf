# ═══════════════════════════════════════════════════════
# Ring of the Middle Earth — Nginx Load Balancer
# Round-robin across 3 Go engine instances
# ═══════════════════════════════════════════════════════

events {
    worker_connections 1024;
}

http {

    # ── Upstream: 3 Go engine instances ──
    upstream game_engines {
        server go-engine-1:8080;
        server go-engine-2:8080;
        server go-engine-3:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Game API endpoints ──
        location / {
            proxy_pass http://game_engines;
            proxy_http_version 1.1;

            # SSE support
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;

            # Forward headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for SSE
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

        }

        # ── Health check ──
        location /health {
            proxy_pass http://game_engines/health;
        }
    }
}
