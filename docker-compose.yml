# ═══════════════════════════════════════════════════════
# Ring of the Middle Earth — Docker Compose
# 10+ services: Zookeeper, Kafka×3, Schema Registry,
# Kafka Init, Kafka Streams, Go Engine×3, Nginx, UI
# ═══════════════════════════════════════════════════════

services:

  # ── ZOOKEEPER ──
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: rotr-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── KAFKA BROKER 1 ──
  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rotr-kafka-1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka-1:29092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── KAFKA BROKER 2 ──
  kafka-2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rotr-kafka-2
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29093,HOST://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2

  # ── KAFKA BROKER 3 ──
  kafka-3:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rotr-kafka-3
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29094,HOST://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2

  # ── SCHEMA REGISTRY ──
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: rotr-schema-registry
    depends_on:
      kafka-1:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  # ── KAFKA INIT (run-once) ──
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rotr-kafka-init
    depends_on:
      kafka-1:
        condition: service_healthy
      schema-registry:
        condition: service_started
    volumes:
      - ./kafka/init:/scripts
      - ./kafka/schemas:/schemas
    entrypoint: ["/bin/bash", "/scripts/create-topics.sh"]
    environment:
      KAFKA_BROKER: kafka-1:29092
      SCHEMA_REGISTRY: http://schema-registry:8081
    restart: "no"

  # ── KAFKA STREAMS (Java) ──
  kafka-streams:
    build:
      context: ./kafka/streams
      dockerfile: Dockerfile
    container_name: rotr-kafka-streams
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
    restart: unless-stopped

  # ── GO ENGINE INSTANCE 1 ──
  go-engine-1:
    build:
      context: ./option-b
      dockerfile: Dockerfile
    container_name: rotr-go-1
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      KAFKA_BROKERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
      INSTANCE_ID: "go-1"
      CONSUMER_GROUP: "rotr-engine-group"
    restart: unless-stopped

  # ── GO ENGINE INSTANCE 2 ──
  go-engine-2:
    build:
      context: ./option-b
      dockerfile: Dockerfile
    container_name: rotr-go-2
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8082:8080"
    environment:
      PORT: "8080"
      KAFKA_BROKERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
      INSTANCE_ID: "go-2"
      CONSUMER_GROUP: "rotr-engine-group"
    restart: unless-stopped

  # ── GO ENGINE INSTANCE 3 ──
  go-engine-3:
    build:
      context: ./option-b
      dockerfile: Dockerfile
    container_name: rotr-go-3
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8083:8080"
    environment:
      PORT: "8080"
      KAFKA_BROKERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
      INSTANCE_ID: "go-3"
      CONSUMER_GROUP: "rotr-engine-group"
    restart: unless-stopped

  # ── NGINX LOAD BALANCER ──
  nginx:
    image: nginx:alpine
    container_name: rotr-nginx
    depends_on:
      - go-engine-1
      - go-engine-2
      - go-engine-3
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  # ── UI (static file server) ──
  ui:
    image: nginx:alpine
    container_name: rotr-ui
    ports:
      - "3000:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./MiddleEarthMap.svg:/usr/share/nginx/html/MiddleEarthMap.svg:ro
    restart: unless-stopped
